# Fly.io — faster than Render free tier when machines stay running.
# Deploy: fly launch --no-deploy && fly deploy
# Docs: https://fly.io/docs/getting-started/launch-app/

app = 'mm-engine-dashboard'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PYTHONPATH = '/app/src:/app'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1