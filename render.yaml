# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: https://dashboard.render.com/select-repo?type=blueprint
# IMPORTANT: Root Directory must be EMPTY. Do NOT put a start command there.
services:
  - type: web
    name: mm-engine-dashboard
    runtime: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PYTHONPATH
        value: /app/src:/app